---
- name: Configure Minecraft server
  hosts: minecraft
  become: true
  vars:
    ecr_image: "339712756067.dkr.ecr.us-east-1.amazonaws.com/minecraft-server:mc-1.21.4-java21"
    s3_backup_bucket: "minecraft-backup-339712756067"
    minecraft_data_dir: "/home/ec2-user/minecraft-data"
    aws_region: "us-east-1"

  tasks:
    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Install pip3
      dnf:
        name: python3-pip
        state: present

    - name: Install Docker SDK for Python
      pip:
        name: docker
        state: present

    - name: Create minecraft data directory
      file:
        path: "{{ minecraft_data_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Authenticate Docker to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin \
        339712756067.dkr.ecr.us-east-1.amazonaws.com
      changed_when: false

    - name: Pull Minecraft image from ECR
      docker_image:
        name: "{{ ecr_image }}"
        source: pull
        force_source: true

    - name: Check if world backup exists in S3
      shell: |
        aws s3 ls s3://{{ s3_backup_bucket }}/ | grep world-backup | tail -1 | awk '{print $4}'
      register: latest_backup
      changed_when: false

    - name: Restore world data from S3 if backup exists and data dir is empty
      shell: |
        aws s3 cp s3://{{ s3_backup_bucket }}/{{ latest_backup.stdout }} /tmp/restore.tar.gz
        tar xzf /tmp/restore.tar.gz -C {{ minecraft_data_dir }}
      when:
        - latest_backup.stdout != ""
        - not (minecraft_data_dir + "/world") is directory

    - name: Start Minecraft container
      docker_container:
        name: minecraft
        image: "{{ ecr_image }}"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "25565:25565"
        volumes:
          - "{{ minecraft_data_dir }}:/data"
        env:
          EULA: "TRUE"
          VERSION: "1.21.4"
          MOTD: "Obsidian Dynamics | Gabe"
          MEMORY: "1536m"
