name: Publish Minecraft Image to ECR

on:
  push:
    tags:
      - 'mc-*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull and tag image
        run: |
          docker pull itzg/minecraft-server:java21
          docker tag itzg/minecraft-server:java21 \
            339712756067.dkr.ecr.us-east-1.amazonaws.com/minecraft-server:${{ github.ref_name }}

      - name: Smoke test
        run: |
          docker run -d \
            --name mc-smoke \
            -e EULA=TRUE \
            -e VERSION=1.21.4 \
            -e MEMORY=512m \
            itzg/minecraft-server:java21
          echo "Waiting for server to initialize..."
          for i in $(seq 1 12); do
            sleep 10
            if docker logs mc-smoke 2>&1 | grep -q "Done"; then
              echo "Smoke test passed"
              docker stop mc-smoke
              docker rm mc-smoke
              exit 0
            fi
            echo "Attempt $i: not ready yet"
          done
          echo "Smoke test failed"
          docker logs mc-smoke
          docker stop mc-smoke
          docker rm mc-smoke
          exit 1

      - name: Push image to ECR
        run: |
          docker push \
            339712756067.dkr.ecr.us-east-1.amazonaws.com/minecraft-server:${{ github.ref_name }}
